version: 2

# Actions and the base image are pinned by commit SHA / digest, which is what
# stops a moved tag from executing in a job that holds packages:write and can
# mint a Sigstore signature. A pin also freezes security fixes, so Dependabot
# advances the pins and keeps the human-readable tag comment in step, turning a
# manual chore into a reviewable PR.
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: chore
    ignore:
      # The project targets Node 22 on purpose (engines, Dockerfile, CI). Keep
      # the base image on 22.x for patch/digest updates; a move to a new major
      # is a deliberate decision, not a Dependabot bump.
      - dependency-name: node
        update-types:
          - version-update:semver-major
