##
# Baseline CI — known-good reference point.
#
# Builds the Docker image straight from the upstream source (unchanged) and
# proves the resulting container boots and serves. This is intentionally
# minimal: it does NOT push to any registry. Publishing a signed image, SBOM
# and vulnerability scanning are a later increment (see README roadmap).
#
# The fast gate on PRs and non-main branches: build the image, run the smoke
# test (health endpoints + a real ffsend upload/download round-trip), and
# report a vulnerability scan. Publishing signed images lives in publish.yml.
##
name: ci-build

on:
  push:
    branches-ignore: [main]   # main is covered by publish.yml (build + smoke + publish)
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Lint was absent from CI until v4.0.0, which is how `npm run lint` stayed
  # broken for months after a dependency bump moved ESLint past the config
  # format it was using. Nobody noticed because nothing ran it.
  #
  # `lint:js` carries a --max-warnings ceiling so the current backlog cannot
  # grow: new warnings fail the job, and the ceiling drops as the backlog is
  # cleared. Errors always fail.
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci
        env:
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: 'true'

      - name: ESLint + stylelint
        run: npm run lint

  backend-tests:
    name: Backend unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci
        env:
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: 'true'

      - name: Backend unit tests
        run: npm run test:backend

  frontend-tests:
    name: Frontend tests (browser)
    runs-on: ubuntu-latest
    # The workflow tests (fileSender/workflow) do a real upload through the test
    # server, which needs a redis backend.
    services:
      redis:
        image: redis:alpine
        ports:
          - 6379:6379
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'

      - name: Install Playwright chromium
        run: npx playwright install --with-deps chromium

      - name: Frontend tests (mocha in chromium)
        run: npm run test:frontend

  build-and-smoke:
    name: Build image + smoke test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (linux/amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: send:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set up Playwright (chromium)
        run: |
          npm i --no-save playwright@1.48.2
          npx playwright install --with-deps chromium

      - name: Smoke test (health + E2EE round-trip + browser render)
        run: bash .github/scripts/smoke.sh

      # Report-only vulnerability scan so every PR/branch build shows the
      # HIGH/CRITICAL count. This is how we measure the delta as the stack is
      # modernized (Tier 3). Non-gating here; the hard gate lives in publish.yml.
      - name: Trivy vulnerability scan (report-only)
        run: |
          set -euo pipefail
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:latest image \
              --scanners vuln --ignore-unfixed --no-progress \
              --severity HIGH,CRITICAL \
              send:ci | tee trivy-report.txt

      - name: Upload Trivy report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.txt
          if-no-files-found: warn

      - name: Dump container logs on failure
        if: failure()
        run: |
          echo "=== send logs ==="; docker logs send  || true
          echo "=== redis logs ==="; docker logs redis || true
