##
# Lint and the unit / browser test suites, as a reusable workflow.
#
# Extracted from ci-build.yml so publish.yml can require them too. Before this,
# ci-build.yml triggered on `push: branches-ignore: [main]` plus `pull_request`.
# A push trigger carrying only a branch filter does not match tag pushes at all,
# and main was excluded on purpose, so on `git push origin v5.0.0` none of these
# jobs ran. publish.yml did build, smoke-test and scan the image, but the
# artifact that ends up cosign-signed and SLSA-attested was the one artifact the
# test suite never saw. The PR path did run them, which made the gap easy to
# miss: every PR was green, and the release was the exception.
##
name: tests

on:
  workflow_call:

permissions:
  contents: read

jobs:
  # Lint was absent from CI until v4.0.0, which is how `npm run lint` stayed
  # broken for months after a dependency bump moved ESLint past the config
  # format it was using. Nobody noticed because nothing ran it.
  #
  # `lint:js` carries a --max-warnings ceiling so the current backlog cannot
  # grow: new warnings fail the job, and the ceiling drops as the backlog is
  # cleared. Errors always fail.
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci
        env:
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: 'true'

      - name: ESLint + stylelint
        run: npm run lint

  backend-tests:
    name: Backend unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci
        env:
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: 'true'

      - name: Backend unit tests
        run: npm run test:backend

  frontend-tests:
    name: Frontend tests (browser)
    runs-on: ubuntu-latest
    # The workflow tests (fileSender/workflow) do a real upload through the test
    # server, which needs a redis backend.
    services:
      redis:
        image: redis:alpine
        ports:
          - 6379:6379
    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'

      - name: Install Playwright chromium
        run: npx playwright install --with-deps chromium

      - name: Frontend tests (mocha in chromium)
        run: npm run test:frontend

  # VERIFYING.md promises the build is reproducible: the same commit produces
  # byte-identical dist/ across Node versions. That was a point-in-time manual
  # result, checked by hand and then trusted. This makes it a gate. Two Node
  # versions build the same checkout; the compare job fails if any served file
  # differs. version.json is identical across the two because both build the
  # same commit.
  reproducible-build:
    name: Reproducible build (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [22, 24]
    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ matrix.node }}

      - name: Install dependencies
        run: npm ci
        env:
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: 'true'

      - name: Build
        run: npm run build

      - name: Hash dist
        run: |
          find dist -type f | sort | xargs sha256sum > "dist-hashes-${{ matrix.node }}.txt"
          echo "$(wc -l < dist-hashes-${{ matrix.node }}.txt) files"

      - name: Upload hashes
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dist-hashes-${{ matrix.node }}
          path: dist-hashes-${{ matrix.node }}.txt
          if-no-files-found: error

  reproducible-compare:
    name: Reproducible build (compare)
    runs-on: ubuntu-latest
    needs: reproducible-build
    steps:
      - name: Download hashes
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: dist-hashes-*
          merge-multiple: true

      - name: Compare
        run: |
          set -euo pipefail
          ls -1 dist-hashes-*.txt
          # Same file list, same hashes, regardless of the Node that built it.
          if diff dist-hashes-22.txt dist-hashes-24.txt; then
            echo "dist/ is byte-identical across Node 22 and 24 ($(wc -l < dist-hashes-22.txt) files)."
          else
            echo "::error::Reproducibility broken: dist/ differs between Node versions."
            echo "VERIFYING.md promises byte-identical output. A dependency that"
            echo "emits Node-version-dependent bytes is the usual cause."
            exit 1
          fi
