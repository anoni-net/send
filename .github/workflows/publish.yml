##
# Tier 2 — image supply chain.
#
# On main and version tags: build from source, smoke test, then publish a
# signed, attested image to GHCR and scan it.
#
#   build (amd64, load) -> smoke test -> Trivy scan (report-only for now)
#     -> build & push to ghcr.io/anoni-net/send (+ SBOM + SLSA provenance)
#     -> cosign keyless signature (Sigstore, via GitHub OIDC)
#
# The vulnerability scan is REPORT-ONLY on purpose: the base image is still
# the EOL node:16.13-alpine pinned upstream, so it will show CRITICAL/HIGH
# findings until the stack is modernized (Tier 3). Flip `--exit-code 1` on the
# Trivy step to make it a hard gate once the base image is current.
#
# Verify a published image (keyless):
#   cosign verify ghcr.io/anoni-net/send@<digest> \
#     --certificate-oidc-issuer https://token.actions.githubusercontent.com \
#     --certificate-identity-regexp '^https://github.com/anoni-net/send/.github/workflows/publish.yml@.*$'
##
name: publish

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

# Least privilege: repo default stays read-only; grant only what this needs.
permissions:
  contents: read
  packages: write   # push to GHCR
  id-token: write   # cosign keyless (Sigstore OIDC)

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/anoni-net/send

jobs:
  publish:
    name: Build, smoke, push, sign, scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      # 1) Build amd64 into the local daemon so we can smoke test BEFORE publishing.
      - name: Build image (load for smoke test)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: send:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test (health + E2EE upload round-trip)
        run: bash .github/scripts/smoke.sh

      # 2) Vulnerability scan of the exact image we are about to publish.
      #    Report-only (exit 0) while the base image is still EOL node:16.
      - name: Trivy vulnerability scan (report-only)
        run: |
          set -euo pipefail
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:latest image \
              --scanners vuln --ignore-unfixed --no-progress \
              --severity HIGH,CRITICAL \
              send:ci | tee trivy-report.txt
          # To make this a hard gate after modernizing the base image, add:
          #   --exit-code 1

      - name: Upload Trivy report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.txt
          if-no-files-found: warn

      # 3) Build & push the tested image with SBOM + SLSA provenance attestations.
      - name: Build and push to GHCR
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          sbom: true
          provenance: mode=max

      # 4) Sign the pushed image by digest, keyless (Sigstore + GitHub OIDC).
      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image (keyless)
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
        run: cosign sign --yes "${IMAGE}@${DIGEST}"

      - name: Summary
        if: always()
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          {
            echo "### Published to GHCR"
            echo ""
            echo "- Image: \`${IMAGE}@${DIGEST}\`"
            echo "- Tags:"
            echo '```'
            echo "${{ steps.meta.outputs.tags }}"
            echo '```'
            echo "- Signed: cosign keyless (Sigstore). SBOM + SLSA provenance attached."
            echo ""
            echo "Verify:"
            echo '```sh'
            echo "cosign verify ${IMAGE}@${DIGEST} \\"
            echo "  --certificate-oidc-issuer https://token.actions.githubusercontent.com \\"
            echo "  --certificate-identity-regexp '^https://github.com/anoni-net/send/.github/workflows/publish.yml@.*\$'"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
