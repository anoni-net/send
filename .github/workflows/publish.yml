##
# Tier 2 — image supply chain.
#
# On main and version tags: build each architecture on its own native runner,
# test it, push it by digest, then join the digests into one multi-arch
# manifest list and sign that.
#
#   build (amd64, ubuntu-latest) -> smoke -> Trivy -> push by digest
#   build (arm64, ubuntu-24.04-arm) -> smoke -> push by digest
#     -> merge into a manifest list, tag it, cosign it
#
# Why native runners instead of QEMU: emulated arm64 builds died in `npm ci`
# with "qemu: uncaught target signal 4 (Illegal instruction)". Emulation was
# also slow, roughly seven extra minutes per publish. GitHub's arm64 runners are
# free for public repositories, so the emulation layer is gone entirely.
#
# The vulnerability scan GATES: a HIGH or CRITICAL with a fix available stops
# the publish.
#
# Verify a published image (keyless):
#   cosign verify ghcr.io/anoni-net/send@<digest> \
#     --certificate-oidc-issuer https://token.actions.githubusercontent.com \
#     --certificate-identity-regexp '^https://github.com/anoni-net/send/.github/workflows/publish.yml@.*$'
##
name: publish

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

# Least privilege: repo default stays read-only; grant only what this needs.
permissions:
  contents: read
  packages: write   # push to GHCR
  id-token: write   # cosign keyless (Sigstore OIDC)

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/anoni-net/send

jobs:
  # Nothing gets built, signed or attested until lint and both test suites pass.
  # These used to live only in ci-build.yml, whose trigger matches neither tag
  # pushes nor main, so the released artifact was the one artifact they never
  # ran against.
  tests:
    uses: ./.github/workflows/tests.yml

  build:
    name: Build ${{ matrix.arch }}
    needs: tests
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      # /__version__ reports `release` from package.json, deliberately, so that
      # a clean rebuild produces the same dist/ as the published image. That
      # only holds if the tag agrees with the tree. A tag that does not means
      # the released image reports one version while the release page carries
      # another, and VERIFYING.md sends people to `git checkout <release>` and
      # to the SHA256SUMS.txt of that tag. Fail before anything is published.
      - name: Tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          set -euo pipefail
          pkg="v$(node -p "require('./package.json').version")"
          echo "tag=${GITHUB_REF_NAME} package.json=${pkg}"
          [ "${GITHUB_REF_NAME}" = "${pkg}" ] || {
            echo "Tag ${GITHUB_REF_NAME} does not match package.json (${pkg})."
            echo "Bump the version in package.json and retag, so /__version__"
            echo "and the release assets agree."
            exit 1; }

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (labels)
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.IMAGE }}

      # Build once and push by digest, WITH the SBOM + SLSA provenance. Every
      # check below then runs against this exact image, pulled back from the
      # registry, so the artifact that gets tested, scanned, checksummed and
      # signed is one and the same. The old flow built twice — a `--load` image
      # for the tests and a separate `--push` image for release — which shared a
      # cache but was never asserted equal, so in principle it tested one image
      # and shipped another. push-by-digest publishes an untagged, unsigned
      # digest; if a check below fails the workflow stops before the merge job
      # tags or signs it, and GHCR garbage-collects the unreferenced digest.
      - name: Build and push by digest (${{ matrix.platform }})
        id: push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ env.IMAGE }}
          outputs: type=image,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}
          sbom: true
          provenance: mode=max

      # Pull that exact digest back and tag it send:ci locally, so the smoke
      # test, the scan and the checksums below all examine the published bytes,
      # not a separately built copy of them.
      - name: Pull the pushed image
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          set -euo pipefail
          docker pull "${IMAGE}@${DIGEST}"
          docker tag "${IMAGE}@${DIGEST}" send:ci

      # Playwright's browser check is optional in smoke.sh: if the install does
      # not work on this architecture the script skips that step and says so,
      # rather than failing the build.
      - name: Set up Playwright (chromium)
        id: playwright
        continue-on-error: true
        run: |
          npm i --no-save playwright@1.48.2
          npx playwright install --with-deps chromium

      # On arm64 the E2EE round-trip is skipped, because ffsend publishes no
      # arm64 binary. smoke.sh logs that it skipped it.
      - name: Smoke test (health + E2EE round-trip + browser render)
        run: bash .github/scripts/smoke.sh

      # Vulnerability scan of the exact image just published. This GATES: a HIGH
      # or CRITICAL with a fix available stops the publish before it is tagged or
      # signed. amd64 only, the package set being identical on both.
      - name: Trivy vulnerability scan (gate)
        if: matrix.arch == 'amd64'
        run: |
          set -euo pipefail
          # Scan a saved tarball, not the live daemon. Mounting the docker socket
          # into an unpinned third-party image would hand it root-equivalent
          # control of the runner one step after the GHCR login. --input needs
          # neither the socket nor a registry pull, and Trivy is pinned by digest.
          docker save send:ci -o /tmp/send-ci-image.tar
          docker run --rm \
            -v /tmp/send-ci-image.tar:/scan/image.tar:ro \
            aquasec/trivy@sha256:b88012e2a0a309d6a8a00463d4e63e5e513377fb74eccbc8f9b0f8f81940ebeb \
              image \
              --scanners vuln --ignore-unfixed --no-progress \
              --severity HIGH,CRITICAL --exit-code 1 \
              --input /scan/image.tar | tee trivy-report.txt

      - name: Upload Trivy report
        if: always() && matrix.arch == 'amd64'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: trivy-report
          path: trivy-report.txt
          if-no-files-found: warn

      # Checksums of everything the server will serve to a browser. Published so
      # anyone can rebuild from source and confirm the bytes they were served
      # match, without having to trust us. See VERIFYING.md.
      #
      # amd64 only: dist/ is JavaScript and assets, and both architectures were
      # verified to produce byte-identical output, so one list covers both.
      - name: Generate asset checksums
        if: matrix.arch == 'amd64'
        run: |
          set -euo pipefail
          docker run --rm --entrypoint sh send:ci \
            -c "cd /app/dist && find . -type f | sort | xargs sha256sum | sed 's|\./||'" \
            > SHA256SUMS.txt
          echo "$(wc -l < SHA256SUMS.txt) files"
          head -5 SHA256SUMS.txt

      - name: Upload asset checksums
        if: matrix.arch == 'amd64'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: SHA256SUMS
          path: SHA256SUMS.txt
          if-no-files-found: error

      - name: Export digest
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest='${{ steps.push.outputs.digest }}'
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: digests-${{ matrix.arch }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

      - name: Dump container logs on failure
        if: failure()
        run: |
          echo "=== send logs ==="; docker logs send  || true
          echo "=== redis logs ==="; docker logs redis || true

  merge:
    name: Merge manifest + sign
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write   # attach SHA256SUMS.txt to the release (tags only)
      packages: write
      id-token: write
    steps:
      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        run: |
          set -euo pipefail
          ls -1
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf "${IMAGE}@sha256:%s " *)

      - name: Read manifest list digest
        id: manifest
        run: |
          set -euo pipefail
          tag=$(jq -r '.tags[0]' <<< "$DOCKER_METADATA_OUTPUT_JSON")
          digest=$(docker buildx imagetools inspect "$tag" --format '{{json .Manifest}}' | jq -r .digest)
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"
          echo "manifest list ${tag} -> ${digest}"
          docker buildx imagetools inspect "$tag"

      # 4) Sign the manifest list by digest, keyless (Sigstore + GitHub OIDC).
      #    Signing the list covers every architecture under it.
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          # v4 installs cosign v3 by default, a major tool jump in the one step
          # the whole verification story rests on, and it only runs at publish
          # so PR CI never exercises it. Pin the tool to the version we already
          # sign with, so upgrading the installer changes nothing about the
          # signatures. Moving to cosign v3 is a deliberate decision: it changes
          # bundle/signature behaviour and would need VERIFYING.md re-checked.
          cosign-release: v2.5.2

      - name: Sign image (keyless)
        env:
          DIGEST: ${{ steps.manifest.outputs.digest }}
        run: cosign sign --yes "${IMAGE}@${DIGEST}"

      # 5) Publish the asset checksums where they do NOT come from the server
      #    being checked. A manifest served by send.anoni.net would prove
      #    nothing: a tampered server would serve a matching tampered list. The
      #    GitHub release is the independent copy.
      - name: Download asset checksums
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: SHA256SUMS

      - name: Attach checksums to the release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # This job never checks the repository out, it only downloads
          # artifacts, so `gh` has no git remote to infer the repository from
          # and exits with "fatal: not a git repository". That went unnoticed
          # because this step only runs for tags, and every run before v5.0.0
          # was a push to main. It cost the v5.0.0 release: the image was built,
          # pushed and signed, and then the release it belongs to was never
          # created. GH_REPO removes the inference entirely.
          GH_REPO: ${{ github.repository }}
          DIGEST: ${{ steps.manifest.outputs.digest }}
        run: |
          set -euo pipefail
          {
            echo "# Send ${GITHUB_REF_NAME} — served asset checksums"
            echo "#"
            echo "# sha256 of every file under /app/dist, which is what the"
            echo "# server serves to a browser. Identical on linux/amd64 and"
            echo "# linux/arm64. Image: ${IMAGE}@${DIGEST}"
            echo "#"
            echo "# To check what you were served, see VERIFYING.md in the repo."
            cat SHA256SUMS.txt
          } > SHA256SUMS-annotated.txt
          mv SHA256SUMS-annotated.txt SHA256SUMS.txt

          # Sign the checksum file itself, keyless, the same way the image is
          # signed. VERIFYING.md rests the whole argument on this list coming
          # from somewhere other than the server being checked, but until now it
          # was protected only by the release's write permission: anyone who
          # could replace a release asset could replace the list that exists to
          # catch replacement. cosign and id-token are already here for the
          # image, so this costs two files and no new trust.
          cosign sign-blob --yes \
            --bundle SHA256SUMS.txt.cosign.bundle \
            SHA256SUMS.txt

          # The release may not exist yet if the tag was pushed first; create it
          # empty in that case rather than failing the publish.
          gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1 \
            || gh release create "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --notes "Release notes to follow."
          gh release upload "${GITHUB_REF_NAME}" \
            SHA256SUMS.txt SHA256SUMS.txt.cosign.bundle --clobber

      - name: Summary
        if: always()
        env:
          DIGEST: ${{ steps.manifest.outputs.digest }}
        run: |
          {
            echo "### Published to GHCR"
            echo ""
            echo "- Image: \`${IMAGE}@${DIGEST}\`"
            echo "- Architectures: linux/amd64, linux/arm64 (built natively, no emulation)"
            echo "- Tags:"
            echo '```'
            echo "${{ steps.meta.outputs.tags }}"
            echo '```'
            echo "- Signed: cosign keyless (Sigstore). SBOM + SLSA provenance attached."
            echo ""
            echo "Verify:"
            echo '```sh'
            echo "cosign verify ${IMAGE}@${DIGEST} \\"
            echo "  --certificate-oidc-issuer https://token.actions.githubusercontent.com \\"
            echo "  --certificate-identity-regexp '^https://github.com/anoni-net/send/.github/workflows/publish.yml@.*\$'"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
