##
# Tier 2 — image supply chain.
#
# On main and version tags: build each architecture on its own native runner,
# test it, push it by digest, then join the digests into one multi-arch
# manifest list and sign that.
#
#   build (amd64, ubuntu-latest) -> smoke -> Trivy -> push by digest
#   build (arm64, ubuntu-24.04-arm) -> smoke -> push by digest
#     -> merge into a manifest list, tag it, cosign it
#
# Why native runners instead of QEMU: emulated arm64 builds died in `npm ci`
# with "qemu: uncaught target signal 4 (Illegal instruction)". Emulation was
# also slow, roughly seven extra minutes per publish. GitHub's arm64 runners are
# free for public repositories, so the emulation layer is gone entirely.
#
# The vulnerability scan is REPORT-ONLY. Flip `--exit-code 1` on the Trivy step
# to make it a hard gate.
#
# Verify a published image (keyless):
#   cosign verify ghcr.io/anoni-net/send@<digest> \
#     --certificate-oidc-issuer https://token.actions.githubusercontent.com \
#     --certificate-identity-regexp '^https://github.com/anoni-net/send/.github/workflows/publish.yml@.*$'
##
name: publish

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

# Least privilege: repo default stays read-only; grant only what this needs.
permissions:
  contents: read
  packages: write   # push to GHCR
  id-token: write   # cosign keyless (Sigstore OIDC)

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/anoni-net/send

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}

      # 1) Build natively into the local daemon so we can test BEFORE publishing.
      - name: Build image (${{ matrix.platform }}, load for smoke test)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: send:ci
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}

      # Playwright's browser check is optional in smoke.sh: if the install does
      # not work on this architecture the script skips that step and says so,
      # rather than failing the build.
      - name: Set up Playwright (chromium)
        id: playwright
        continue-on-error: true
        run: |
          npm i --no-save playwright@1.48.2
          npx playwright install --with-deps chromium

      # On arm64 the E2EE round-trip is skipped, because ffsend publishes no
      # arm64 binary. smoke.sh logs that it skipped it.
      - name: Smoke test (health + E2EE round-trip + browser render)
        run: bash .github/scripts/smoke.sh

      # 2) Vulnerability scan of the exact image we are about to publish.
      #    Report-only (exit 0). amd64 only: the findings are the same package
      #    set on both, and one report is enough to track the delta.
      - name: Trivy vulnerability scan (report-only)
        if: matrix.arch == 'amd64'
        run: |
          set -euo pipefail
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:latest image \
              --scanners vuln --ignore-unfixed --no-progress \
              --severity HIGH,CRITICAL \
              send:ci | tee trivy-report.txt
          # To make this a hard gate, add:
          #   --exit-code 1

      - name: Upload Trivy report
        if: always() && matrix.arch == 'amd64'
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.txt
          if-no-files-found: warn

      # 3) Push this architecture by digest, with SBOM + SLSA provenance. No
      #    tags here: the merge job below applies them to the manifest list.
      - name: Push by digest
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ env.IMAGE }}
          outputs: type=image,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.arch }}
          sbom: true
          provenance: mode=max

      - name: Export digest
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest='${{ steps.push.outputs.digest }}'
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.arch }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

      - name: Dump container logs on failure
        if: failure()
        run: |
          echo "=== send logs ==="; docker logs send  || true
          echo "=== redis logs ==="; docker logs redis || true

  merge:
    name: Merge manifest + sign
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        run: |
          set -euo pipefail
          ls -1
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf "${IMAGE}@sha256:%s " *)

      - name: Read manifest list digest
        id: manifest
        run: |
          set -euo pipefail
          tag=$(jq -r '.tags[0]' <<< "$DOCKER_METADATA_OUTPUT_JSON")
          digest=$(docker buildx imagetools inspect "$tag" --format '{{json .Manifest}}' | jq -r .digest)
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"
          echo "manifest list ${tag} -> ${digest}"
          docker buildx imagetools inspect "$tag"

      # 4) Sign the manifest list by digest, keyless (Sigstore + GitHub OIDC).
      #    Signing the list covers every architecture under it.
      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image (keyless)
        env:
          DIGEST: ${{ steps.manifest.outputs.digest }}
        run: cosign sign --yes "${IMAGE}@${DIGEST}"

      - name: Summary
        if: always()
        env:
          DIGEST: ${{ steps.manifest.outputs.digest }}
        run: |
          {
            echo "### Published to GHCR"
            echo ""
            echo "- Image: \`${IMAGE}@${DIGEST}\`"
            echo "- Architectures: linux/amd64, linux/arm64 (built natively, no emulation)"
            echo "- Tags:"
            echo '```'
            echo "${{ steps.meta.outputs.tags }}"
            echo '```'
            echo "- Signed: cosign keyless (Sigstore). SBOM + SLSA provenance attached."
            echo ""
            echo "Verify:"
            echo '```sh'
            echo "cosign verify ${IMAGE}@${DIGEST} \\"
            echo "  --certificate-oidc-issuer https://token.actions.githubusercontent.com \\"
            echo "  --certificate-identity-regexp '^https://github.com/anoni-net/send/.github/workflows/publish.yml@.*\$'"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
